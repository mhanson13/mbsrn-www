              cert_collect_output="$(MANAGED_CERTIFICATE_JSON="$managed_certificate_json" EXPECTED_PREVIEW_HOST="$preview_host" EXPECTED_CERT_NAME="$expected_cert_name_collect" python - <<'PY'
          import json
          import os

          raw = str(os.environ.get('MANAGED_CERTIFICATE_JSON') or '').strip()
          expected_host = str(os.environ.get('EXPECTED_PREVIEW_HOST') or '').strip().lower()
          payload = json.loads(raw) if raw else {}
          spec_domains = [
              str(item).strip().lower()
              for item in (payload.get('spec', {}).get('domains') or [])
              if str(item).strip()
          ]
          status_payload = payload.get('status') if isinstance(payload.get('status'), dict) else {}
          cert_status = str(status_payload.get('certificateStatus') or '').strip().upper()
          domain_status_payload = status_payload.get('domainStatus')
          domain_status_map = {}
          if isinstance(domain_status_payload, list):
              for item in domain_status_payload:
                  if not isinstance(item, dict):
                      continue
                  domain = str(item.get('domain') or '').strip().lower()
                  status = str(item.get('status') or '').strip().upper()
                  if domain:
                      domain_status_map[domain] = status
          elif isinstance(domain_status_payload, dict):
              for key, value in domain_status_payload.items():
                  domain = str(key or '').strip().lower()
                  if not domain:
                      continue
                  if isinstance(value, dict):
                      status = str(value.get('status') or '').strip().upper()
                  else:
                      status = str(value or '').strip().upper()
                  domain_status_map[domain] = status
          domain_status = domain_status_map.get(expected_host, '') if expected_host else ''
          domain_exact_match = bool(expected_host) and len(spec_domains) == 1 and spec_domains[0] == expected_host
          print(f'cert_status={cert_status}')
          print(f'domain_status={domain_status}')
          print('domain_exact_match=' + ('true' if domain_exact_match else 'false'))
          print('spec_domains=' + ','.join(spec_domains))
          PY
              )"
              domain_exact_match=false
              while IFS='=' read -r key value; do
                case "$key" in
                  cert_status)
                    tls_certificate_status="$value"
                    ;;
                  domain_status)
                    tls_domain_status="$value"
                    ;;
                  domain_exact_match)
                    domain_exact_match="$value"
                    ;;
                  spec_domains)
                    observed_managed_certificate_domains="$value"
                    ;;
                esac
              done <<< "$cert_collect_output"
              normalized_cert_status="$(echo "$tls_certificate_status" | tr '[:lower:]' '[:upper:]' | tr -d '[:space:]')"
              normalized_domain_status="$(echo "$tls_domain_status" | tr '[:lower:]' '[:upper:]' | tr -d '[:space:]')"
              if [ -z "$observed_managed_certificate_domains" ] && [ "$domain_exact_match" = "true" ] && [ -n "$preview_host" ]; then
                observed_managed_certificate_domains="$preview_host"
              fi
              observed_managed_certificate_status="$tls_certificate_status"
              observed_managed_certificate_domain_status="$tls_domain_status"
              if [ "$domain_exact_match" = "true" ]; then
                cert_identity_valid=true
              else
                cert_identity_valid=false
              fi
            fi
          }
          for attempt in $(seq 1 "$max_attempts"); do
            preview_probe_attempt="$attempt"
            ingress_host="$(kubectl get ingress site-web --namespace "$K8S_NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
            ingress_ip="$(kubectl get ingress site-web --namespace "$K8S_NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)"
            ingress_spec_host="$(kubectl get ingress site-web --namespace "$K8S_NAMESPACE" -o jsonpath='{.spec.rules[0].host}' 2>/dev/null || true)"
            if [ -z "$preview_host" ] && [ -n "$ingress_spec_host" ]; then
              preview_host="$ingress_spec_host"
            fi
            if [ -n "$preview_host" ]; then
              https_probe_output="$(mktemp)"
              https_probe_attempted=true
              if https_code="$(curl --silent --show-error --connect-timeout 5 --max-time 10 --output /dev/null --write-out '%{http_code}' "https://$preview_host" 2>"$https_probe_output")"; then
                if echo "$https_code" | grep -Eq '^[1-5][0-9][0-9]$'; then
                  preview_https_status="$https_code"
                  if [ "$https_code" = "502" ]; then
                    backend_502_detected=true
                    set_https_probe_error_summary "ingress_backend_502" "" "$https_code" "$https_probe_output"
                    echo "deploy_runtime_reason_code=ingress_backend_502"
                    echo "Expected preview hostname responded with ${https_code} over HTTPS, indicating backend unhealthy state."
                    rm -f "$https_probe_output"
                    break
                  fi
                  host_reachable=true
                  host_reachability_scheme="https"
                  rm -f "$https_probe_output"
                  echo "Expected preview hostname responded over HTTPS on attempt ${attempt}/${max_attempts} with status ${https_code}."
                  break
                fi
              else
                https_exit=$?
                if [ "$https_exit" -eq 60 ] || grep -qiE 'SSL certificate problem|SSL_ERROR_BAD_CERT_DOMAIN|certificate subject name|no alternative certificate subject name' "$https_probe_output"; then
                  tls_mismatch_detected=true
                  echo "Expected preview hostname is reachable but TLS certificate does not match."
                  echo "deploy_runtime_reason_code=reachable_but_tls_certificate_mismatch"
                  set_https_probe_error_summary "reachable_but_tls_certificate_mismatch" "$https_exit" "" "$https_probe_output"
                  cat "$https_probe_output"
                  rm -f "$https_probe_output"
                  break
                fi
              fi
              rm -f "$https_probe_output"
              http_fallback_attempted=true
              http_code="$(curl --silent --show-error --connect-timeout 5 --max-time 10 --output /dev/null --write-out '%{http_code}' "http://$preview_host" 2>/dev/null || true)"
              if echo "$http_code" | grep -Eq '^[1-5][0-9][0-9]$'; then
                preview_http_status="$http_code"
                if [ "$http_code" = "502" ]; then
                  backend_502_detected=true
                  set_https_probe_error_summary "ingress_backend_502" "" "$http_code" ""
                  echo "deploy_runtime_reason_code=ingress_backend_502"
                  echo "Expected preview hostname responded with ${http_code} over HTTP, indicating backend unhealthy state."
                  break
                fi
                host_reachable=true
                host_reachability_scheme="http"
                echo "Expected preview hostname responded over HTTP on attempt ${attempt}/${max_attempts} with status ${http_code}."
                echo "deploy_runtime_reason_code=ingress_address_pending_but_hostname_reachable"
                break
              fi
            fi
            if [ -n "$ingress_host" ] || [ -n "$ingress_ip" ]; then
              echo "Ingress external address resolved on attempt ${attempt}/${max_attempts}."
              break
            fi
            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Ingress external address not ready yet (attempt ${attempt}/${max_attempts}); sleeping ${sleep_seconds}s."
              sleep "$sleep_seconds"
            fi
          done
          collect_resolve_live_url_evidence
          if [ "$tls_mismatch_detected" = true ]; then
            normalized_cert_status_early="$(echo "$tls_certificate_status" | tr '[:lower:]' '[:upper:]' | tr -d '[:space:]')"
            normalized_domain_status_early="$(echo "$tls_domain_status" | tr '[:lower:]' '[:upper:]' | tr -d '[:space:]')"
            if [ "$normalized_domain_status_early" = "FAILED_NOT_VISIBLE" ] || [ "$normalized_cert_status_early" = "FAILED_NOT_VISIBLE" ]; then
              echo "deploy_runtime_reason_code=managed_certificate_failed_not_visible"
              echo "deploy_runtime_reason_message=ManagedCertificate is not visible; verify DNS and load balancer exposure."
            elif [ "$normalized_domain_status_early" = "PROVISIONING" ] || [ "$normalized_cert_status_early" = "PROVISIONING" ] || [ "$normalized_domain_status_early" = "" ] || [ "$normalized_domain_status_early" = "UNKNOWN" ] || [ "$normalized_cert_status_early" = "UNKNOWN" ]; then
              echo "deploy_runtime_reason_code=managed_certificate_pending"
              echo "deploy_runtime_reason_code=tls_certificate_provisioning"
              echo "deploy_runtime_reason_message=ManagedCertificate provisioning/status is still pending for expected hostname."
            else
              echo "deploy_runtime_reason_code=tls_certificate_bound_to_wrong_site"
              echo "deploy_runtime_reason_code=reachable_but_tls_certificate_mismatch"
              echo "deploy_runtime_reason_message=Expected hostname is reachable but TLS certificate is bound to another site."
            fi
            kubectl get ingress site-web --namespace "$K8S_NAMESPACE" -o wide || true
            kubectl describe ingress site-web --namespace "$K8S_NAMESPACE" || true
            kubectl describe managedcertificate "$MBSRN_PREVIEW_CERTIFICATE_NAME" --namespace "$K8S_NAMESPACE" || true
            exit 1
          fi
          if [ "$backend_502_detected" = true ]; then
            if [ -z "$https_probe_error_summary" ]; then
              set_https_probe_error_summary "ingress_backend_502" "" "502" ""
            fi
            collect_ingress_502_runtime_diagnostics
            if [ "$gce_backend_health_status" = "HEALTHY" ] && [ "$service_probe_status" = "ok" ] && [ "$preview_https_status" = "502" ]; then
              echo "deploy_runtime_reason_message=Preview hostname is reachable but returns HTTP 502 while GCE backend reports HEALTHY and in-cluster probes succeed. Likely ingress/LB edge convergence or stale backend path."
            elif [ "$service_probe_status" = "http_502" ] || [ "$endpoint_probe_status" = "http_502" ]; then
              echo "deploy_runtime_reason_message=Preview hostname is reachable but returns HTTP 502 and in-cluster service/endpoint probes also return 502. Likely app runtime response failure."
            elif [ "$pod_restart_detected" = true ]; then
              echo "deploy_runtime_reason_message=Preview hostname is reachable but returns HTTP 502 with pod restart/crash evidence. Likely pod runtime instability."
            else
              echo "deploy_runtime_reason_message=Ingress hostname is reachable but backend returned 5xx. Review pod logs, in-cluster service probe status, endpoint probe status, and backend health evidence."
            fi
            kubectl get service site-web --namespace "$K8S_NAMESPACE" -o wide || true
            kubectl describe service site-web --namespace "$K8S_NAMESPACE" || true
            kubectl get endpoints site-web --namespace "$K8S_NAMESPACE" -o wide || true
            kubectl get endpointslice --namespace "$K8S_NAMESPACE" -l kubernetes.io/service-name=site-web -o wide || true
            kubectl describe ingress site-web --namespace "$K8S_NAMESPACE" || true
            kubectl describe backendconfig "$MBSRN_BACKEND_CONFIG_NAME" --namespace "$K8S_NAMESPACE" || true
            exit 1
          fi
          if [ "$host_reachable" = true ] && [ -n "$preview_host" ]; then
            if [ "$host_reachability_scheme" = "http" ]; then
              live_url="http://$preview_host"
            else
              live_url="https://$preview_host"
            fi
          elif [ -n "$preview_host" ]; then
            live_url="https://$preview_host"
          elif [ -n "$ingress_host" ]; then
            live_url="https://$ingress_host"
          elif [ -n "$ingress_ip" ]; then
            live_url="http://$ingress_ip"
          fi
          if [ -z "$live_url" ]; then
            if [ "$https_probe_attempted" != "true" ]; then
              https_probe_error_summary="reason=https_probe_not_attempted;detail=https_probe_not_attempted"
              echo "deploy_runtime_reason_code=https_probe_not_attempted"
            fi
            echo "Ingress created but external address is not assigned yet for namespace $K8S_NAMESPACE."
            echo "Likely rollout blocker: ingress/load balancer provisioning still in progress."
            echo "This may take several minutes on GKE."
            echo "deploy_runtime_reason_code=ingress_address_pending"
            echo "deploy_runtime_reason_message=Ingress created but external address not yet assigned."
            kubectl get ingress site-web --namespace "$K8S_NAMESPACE" -o wide || true
            kubectl describe ingress site-web --namespace "$K8S_NAMESPACE" || true
            kubectl get service site-web --namespace "$K8S_NAMESPACE" -o wide || true
            kubectl get endpoints site-web --namespace "$K8S_NAMESPACE" -o wide || true
            kubectl get endpointslice --namespace "$K8S_NAMESPACE" -l kubernetes.io/service-name=site-web -o wide || true
            kubectl get managedcertificate "$MBSRN_PREVIEW_CERTIFICATE_NAME" --namespace "$K8S_NAMESPACE" || true
            managedcertificate_pending_output="$(mktemp)"
            kubectl describe managedcertificate "$MBSRN_PREVIEW_CERTIFICATE_NAME" --namespace "$K8S_NAMESPACE" > "$managedcertificate_pending_output" 2>&1 || true
            cat "$managedcertificate_pending_output"
            if grep -qiE 'failednotvisible' "$managedcertificate_pending_output"; then
              echo "deploy_runtime_reason_code=managed_certificate_failed_not_visible"
            fi
            rm -f "$managedcertificate_pending_output"
            ingress_pending_output="$(mktemp)"
            kubectl describe ingress site-web --namespace "$K8S_NAMESPACE" > "$ingress_pending_output" 2>&1 || true
            cat "$ingress_pending_output"
            if grep -qiE 'NEG|network endpoint group|load balancer|loadbalancer|creating|attaching|detaching|sync|provisioning|reconcile' "$ingress_pending_output"; then
              echo "deploy_runtime_reason_code=ingress_neg_convergence_pending"
            fi
            if grep -qiE 'in-use and would result in a conflict|global static ip.*conflict|specified ip address is in-use' "$ingress_pending_output"; then
              echo "deploy_runtime_reason_code=ingress_static_ip_conflict"
            fi
            pre_shared_pending_annotation="$(kubectl get ingress site-web --namespace "$K8S_NAMESPACE" -o jsonpath='{.metadata.annotations.ingress\.gcp\.kubernetes\.io/pre-shared-cert}' 2>/dev/null || true)"
            if [ -n "$pre_shared_pending_annotation" ]; then
              echo "Observed ingress pre-shared certificate controller metadata: $pre_shared_pending_annotation"
              expected_cert_name_pending="$(echo "$MBSRN_PREVIEW_CERTIFICATE_NAME" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
              pre_shared_pending_values="$(echo "$pre_shared_pending_annotation" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d' | tr '[:upper:]' '[:lower:]')"
              pre_shared_pending_count="$(echo "$pre_shared_pending_values" | sed '/^$/d' | wc -l | tr -d '[:space:]')"
              pre_shared_pending_first="$(echo "$pre_shared_pending_values" | head -n1 | tr -d '[:space:]')"
              pre_shared_pending_metadata_mismatch=false
              if [ "$pre_shared_pending_count" -ne 1 ] || [ "$pre_shared_pending_first" != "$expected_cert_name_pending" ]; then
                pre_shared_pending_metadata_mismatch=true
              fi
              if [ "$pre_shared_pending_metadata_mismatch" = true ]; then
                echo "deploy_runtime_reason_code=pre_shared_cert_metadata_mismatch"
              fi
            fi
            rm -f "$ingress_pending_output"
            kubectl get frontendconfig "$MBSRN_FRONTEND_CONFIG_NAME" --namespace "$K8S_NAMESPACE" || true
            kubectl get backendconfig "$MBSRN_BACKEND_CONFIG_NAME" --namespace "$K8S_NAMESPACE" || true
            exit 1
          fi
          if [ -z "$preview_host" ]; then
            if [ "$https_probe_attempted" != "true" ]; then
              https_probe_error_summary="reason=https_probe_not_attempted;detail=preview_host_missing"
              echo "deploy_runtime_reason_code=https_probe_not_attempted"
            fi
            echo "deploy_runtime_reason_code=ingress_address_pending"
            echo "deploy_runtime_reason_message=Preview hostname is missing; cannot validate DNS/TLS identity."
            exit 1
          fi
          if [ "$host_reachable" = true ] && [ "$host_reachability_scheme" = "https" ] && [ -z "$ingress_ip" ]; then
            ingress_ip="$(kubectl get ingress site-web --namespace "$K8S_NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)"
            ingress_host="$(kubectl get ingress site-web --namespace "$K8S_NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
            if [ -n "$ingress_ip" ] || [ -n "$ingress_host" ]; then
              echo "Ingress external address observed after HTTPS success verification."
            fi
          fi
          if [ -z "$ingress_ip" ] && [ "$host_reachable" != "true" ]; then
            echo "deploy_runtime_reason_code=ingress_address_pending"
            echo "deploy_runtime_reason_message=Ingress external IP is required before DNS/TLS validation."
            exit 1
          fi
          ingress_status_ip="$ingress_ip"
          dns_expected_ip="$ingress_status_ip"
          expected_static_ip_name="$(echo "$MBSRN_PREVIEW_STATIC_IP_NAME" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
          ingress_static_ip_annotation="$(kubectl get ingress site-web --namespace "$K8S_NAMESPACE" -o jsonpath='{.metadata.annotations.kubernetes\.io/ingress\.global-static-ip-name}' 2>/dev/null || true)"
          normalized_ingress_static_ip_annotation="$(echo "$ingress_static_ip_annotation" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
          echo "expected_static_ip_name=$expected_static_ip_name"
          echo "observed_ingress_static_ip_annotation=$ingress_static_ip_annotation"
          if [ -z "$normalized_ingress_static_ip_annotation" ]; then
            ingress_conflict_detected=true
            echo "deploy_runtime_reason_code=expected_static_ip_not_bound_to_ingress"
            echo "deploy_runtime_reason_message=Ingress is missing expected per-site static IP annotation binding."
            exit 1
          fi
          if [ "$normalized_ingress_static_ip_annotation" != "$expected_static_ip_name" ]; then
            ingress_conflict_detected=true
            echo "deploy_runtime_reason_code=ingress_static_ip_conflict"
            echo "deploy_runtime_reason_code=shared_static_ip_not_allowed_for_per_site_ingress"
            echo "deploy_runtime_reason_message=Ingress static IP annotation does not match expected per-site static IP name."
            exit 1
          fi
          static_ip_metadata_json="$(gcloud compute addresses describe "$MBSRN_PREVIEW_STATIC_IP_NAME" --global --project "$GKE_PROJECT_ID" --format='json(name,address,status,users)' 2>/dev/null || true)"
          if [ -n "$static_ip_metadata_json" ]; then
            static_ip_metadata_eval="$(STATIC_IP_METADATA_JSON="$static_ip_metadata_json" python - <<'PY'
          import json
          import os

          raw = str(os.environ.get('STATIC_IP_METADATA_JSON') or '').strip()
          payload = {}
          if raw:
              try:
                  payload = json.loads(raw)
              except Exception:
                  payload = {}
          address = str(payload.get('address') or '').strip()
          status = str(payload.get('status') or '').strip().upper()
          users = payload.get('users')
          normalized_users = []
          if isinstance(users, list):
              for item in users:
                  candidate = str(item or '').strip()
                  if candidate:
                      normalized_users.append(candidate)
          print(f'address={address}')
          print(f'status={status}')
          print('users=' + ','.join(normalized_users))
          PY
            )"
            while IFS='=' read -r key value; do
              case "$key" in
                address)
                  expected_static_ip_address="$value"
                  ;;
                status)
                  static_ip_status="$value"
                  ;;
                users)
                  static_ip_users="$value"
                  ;;
              esac
            done <<EOF
          $static_ip_metadata_eval
          EOF
          fi
          if [ -n "$expected_static_ip_address" ]; then
            dns_expected_ip="$expected_static_ip_address"
            if [ -n "$ingress_status_ip" ] && [ "$ingress_status_ip" = "$expected_static_ip_address" ]; then
              ingress_status_ip_matches_static_ip=true
            fi
          fi
          namespace_binding_token="$(echo "$K8S_NAMESPACE" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-')"
          if [ -n "$static_ip_users" ] && [ -n "$namespace_binding_token" ]; then
            static_ip_users_lower="$(echo "$static_ip_users" | tr '[:upper:]' '[:lower:]')"
            while IFS= read -r static_user_entry; do
              if [ -z "$static_user_entry" ]; then
                continue
              fi
              if echo "$static_user_entry" | grep -Fq '/global/forwardingRules/' \
                && echo "$static_user_entry" | grep -Fq 'site-web' \
                && echo "$static_user_entry" | grep -Fq "$namespace_binding_token"; then
                static_ip_bound_to_expected_forwarding_rule=true
                break
              fi
            done <<EOF
          $(echo "$static_ip_users_lower" | tr ',' '\n')
          EOF
          fi
          if [ -n "$expected_static_ip_address" ]; then
            if [ "$static_ip_status" != "IN_USE" ] || [ "$static_ip_bound_to_expected_forwarding_rule" != "true" ]; then
              ingress_conflict_detected=true
              echo "deploy_runtime_reason_code=expected_static_ip_not_bound_to_ingress"
              echo "deploy_runtime_reason_message=Reserved per-site static IP is not yet bound to expected forwarding rules for this site ingress."
              echo "expected_static_ip_address=$expected_static_ip_address"
              echo "static_ip_status=$static_ip_status"
              echo "static_ip_users=$static_ip_users"
              exit 1
            fi
          fi
          if [ -z "$dns_expected_ip" ]; then
            echo "deploy_runtime_reason_code=ingress_address_pending"
            echo "deploy_runtime_reason_message=Neither ingress status IP nor reserved static IP address is available for DNS/TLS validation yet."
            exit 1
          fi
          ingress_validation_output="$(mktemp)"
          kubectl describe ingress site-web --namespace "$K8S_NAMESPACE" > "$ingress_validation_output" 2>&1 || true
          if grep -qiE 'in-use and would result in a conflict|global static ip.*conflict|specified ip address is in-use' "$ingress_validation_output"; then
            ingress_conflict_detected=true
            echo "deploy_runtime_reason_code=ingress_static_ip_conflict"
            cat "$ingress_validation_output"
            rm -f "$ingress_validation_output"
            exit 1
          fi
          rm -f "$ingress_validation_output"
          expected_cert_name="$(echo "$MBSRN_PREVIEW_CERTIFICATE_NAME" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
          pre_shared_cert_metadata_mismatch=false
          pre_shared_cert_controller_cross_site_evidence=false
          managed_cert_annotation="$(kubectl get ingress site-web --namespace "$K8S_NAMESPACE" -o jsonpath='{.metadata.annotations.networking\.gke\.io/managed-certificates}' 2>/dev/null || true)"
          echo "managed_certificate_resource_name=$MBSRN_PREVIEW_CERTIFICATE_NAME"
          echo "expected_preview_hostname=$preview_host"
          echo "expected_managed_certificate_name=$expected_cert_name"
          echo "observed_managed_certificate_annotation=$managed_cert_annotation"
          managed_cert_annotation_values="$(echo "$managed_cert_annotation" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d' | tr '[:upper:]' '[:lower:]')"
          managed_cert_annotation_count="$(echo "$managed_cert_annotation_values" | sed '/^$/d' | wc -l | tr -d '[:space:]')"
          managed_cert_annotation_first="$(echo "$managed_cert_annotation_values" | head -n1 | tr -d '[:space:]')"
          if [ "$managed_cert_annotation_count" -le 0 ]; then
            echo "deploy_runtime_reason_code=ingress_certificate_annotation_mismatch"
            echo "deploy_runtime_reason_message=Ingress is missing managed certificate annotation."
            exit 1
          fi
          if [ "$managed_cert_annotation_count" -gt 1 ]; then
            echo "deploy_runtime_reason_code=managed_certificate_identity_mismatch"
            echo "deploy_runtime_reason_message=Ingress annotation references multiple managed certificates."
            exit 1
          fi
          if [ "$managed_cert_annotation_first" != "$expected_cert_name" ]; then
            echo "deploy_runtime_reason_code=ingress_certificate_annotation_mismatch"
            echo "deploy_runtime_reason_message=Ingress managed certificate annotation does not match expected site certificate."
            exit 1
          fi
          pre_shared_cert_annotation="$(kubectl get ingress site-web --namespace "$K8S_NAMESPACE" -o jsonpath='{.metadata.annotations.ingress\.gcp\.kubernetes\.io/pre-shared-cert}' 2>/dev/null || true)"
          if [ -n "$pre_shared_cert_annotation" ]; then
            echo "observed_pre_shared_cert_annotation=$pre_shared_cert_annotation"
            pre_shared_values="$(echo "$pre_shared_cert_annotation" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d' | tr '[:upper:]' '[:lower:]')"
            pre_shared_count="$(echo "$pre_shared_values" | sed '/^$/d' | wc -l | tr -d '[:space:]')"
            pre_shared_first="$(echo "$pre_shared_values" | head -n1 | tr -d '[:space:]')"
            if [ "$pre_shared_count" -ne 1 ] || [ "$pre_shared_first" != "$expected_cert_name" ]; then
              pre_shared_cert_metadata_mismatch=true
            fi
            if echo "$pre_shared_values" | grep -qiE '^site-web-preview-cert-'; then
              if ! echo "$pre_shared_values" | grep -qx "$expected_cert_name"; then
                pre_shared_cert_controller_cross_site_evidence=true
              fi
            fi
            if [ "$pre_shared_cert_metadata_mismatch" = true ]; then
              echo "deploy_runtime_reason_code=pre_shared_cert_metadata_mismatch"
              echo "Pre-shared cert annotation is controller metadata and does not block deploy by itself; relying on managed-certificate annotation/domain/TLS checks."
            fi
          fi
          dns_ip=""
          if command -v dig >/dev/null 2>&1; then
            dns_ip="$(dig +short "$preview_host" A | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 | tr -d '[:space:]')"
          fi
          if [ -z "$dns_ip" ] && command -v nslookup >/dev/null 2>&1; then
            dns_ip="$(nslookup "$preview_host" 2>/dev/null | awk '/^Address: / {print $2}' | tail -n1 | tr -d '[:space:]')"
          fi
          dns_observed_ip="$dns_ip"
          if [ -z "$dns_observed_ip" ] || [ "$dns_observed_ip" != "$dns_expected_ip" ]; then
            dns_record_matches_ingress=false
            echo "deploy_runtime_reason_code=dns_record_mismatch"
            if [ -z "$dns_observed_ip" ]; then
              echo "deploy_runtime_reason_code=ingress_ip_assigned_but_dns_not_updated"
            else
              echo "deploy_runtime_reason_code=dns_points_to_old_ingress_ip"
            fi
            echo "deploy_runtime_reason_message=DNS A record does not match expected DNS target IP for preview hostname."
            echo "expected_hostname=$preview_host"
            echo "dns_expected_ip=$dns_expected_ip"
            echo "ingress_ip=$ingress_status_ip"
            echo "observed_dns_ip=$dns_observed_ip"
            if [ -n "$expected_static_ip_address" ]; then
              echo "expected_static_ip_address=$expected_static_ip_address"
              echo "static_ip_status=$static_ip_status"
              echo "static_ip_users=$static_ip_users"
            fi
            exit 1
          fi
          dns_record_matches_ingress=true
          if [ -n "$expected_static_ip_address" ] \
            && [ "$ingress_status_ip_matches_static_ip" != "true" ] \
            && [ "$static_ip_status" = "IN_USE" ] \
            && [ "$static_ip_bound_to_expected_forwarding_rule" = "true" ]; then
            echo "deploy_runtime_reason_code=ingress_status_ip_stale_or_mismatched"
            echo "Ingress status IP differs from reserved static IP, but reserved static IP is bound and DNS already matches expected static IP."
          fi
          managed_certificate_json="$(kubectl get managedcertificate "$MBSRN_PREVIEW_CERTIFICATE_NAME" --namespace "$K8S_NAMESPACE" -o json 2>/dev/null || true)"
          if [ -z "$managed_certificate_json" ]; then
            echo "deploy_runtime_reason_code=ingress_certificate_annotation_mismatch"
            echo "deploy_runtime_reason_message=Expected ManagedCertificate resource was not found in namespace."
            exit 1
          fi
          evaluate_managed_certificate() {
            local managed_certificate_payload="$1"
            MANAGED_CERTIFICATE_JSON="$managed_certificate_payload" EXPECTED_PREVIEW_HOST="$preview_host" EXPECTED_CERT_NAME="$expected_cert_name" python - <<'PY'
          import json
          import os

          raw = str(os.environ.get('MANAGED_CERTIFICATE_JSON') or '').strip()
          expected_host = str(os.environ.get('EXPECTED_PREVIEW_HOST') or '').strip().lower()
          expected_cert_name = str(os.environ.get('EXPECTED_CERT_NAME') or '').strip().lower()
          payload = json.loads(raw) if raw else {}
          resource_name = str((payload.get('metadata') or {}).get('name') or '').strip().lower()
          spec_domains = [
              str(item).strip().lower()
              for item in (payload.get('spec', {}).get('domains') or [])
              if str(item).strip()
          ]
          status_payload = payload.get('status') if isinstance(payload.get('status'), dict) else {}
          cert_status = str(status_payload.get('certificateStatus') or '').strip().upper()
          domain_status_payload = status_payload.get('domainStatus')
          domain_status_map = {}
          if isinstance(domain_status_payload, list):
              for item in domain_status_payload:
                  if not isinstance(item, dict):
                      continue
                  domain = str(item.get('domain') or '').strip().lower()
                  status = str(item.get('status') or '').strip().upper()
                  if domain:
                      domain_status_map[domain] = status
          elif isinstance(domain_status_payload, dict):
              for key, value in domain_status_payload.items():
                  domain = str(key or '').strip().lower()
                  if not domain:
                      continue
                  if isinstance(value, dict):
                      status = str(value.get('status') or '').strip().upper()
                  else:
                      status = str(value or '').strip().upper()
                  domain_status_map[domain] = status

          domain_status = domain_status_map.get(expected_host, '')
          domain_exact_match = len(spec_domains) == 1 and spec_domains[0] == expected_host
          resource_name_matches_expected = bool(resource_name and expected_cert_name and resource_name == expected_cert_name)
          print(f'cert_status={cert_status}')
          print(f'domain_status={domain_status}')
          print('domain_exact_match=' + ('true' if domain_exact_match else 'false'))
          print(f'resource_name={resource_name}')
          print('resource_name_matches_expected=' + ('true' if resource_name_matches_expected else 'false'))
          print('domain_count=' + str(len(spec_domains)))
          print('spec_domains=' + ','.join(spec_domains))
          PY
          }
          apply_managed_certificate_eval_output() {
            local cert_eval_payload="$1"
            domain_exact_match=false
            resource_name_matches_expected=false
            cert_resource_name=""
            observed_managed_certificate_domains=""
            while IFS='=' read -r key value; do
              case "$key" in
                cert_status)
                  tls_certificate_status="$value"
                  ;;
                domain_status)
                  tls_domain_status="$value"
                  ;;
                domain_exact_match)
                  domain_exact_match="$value"
                  ;;
                resource_name)
                  cert_resource_name="$value"
                  ;;
                resource_name_matches_expected)
                  resource_name_matches_expected="$value"
                  ;;
                spec_domains)
                  observed_managed_certificate_domains="$value"
                  ;;
              esac
            done <<< "$cert_eval_payload"
            normalized_cert_status="$(echo "$tls_certificate_status" | tr '[:lower:]' '[:upper:]' | tr -d '[:space:]')"
            normalized_domain_status="$(echo "$tls_domain_status" | tr '[:lower:]' '[:upper:]' | tr -d '[:space:]')"
            if [ -z "$observed_managed_certificate_domains" ] && [ "$domain_exact_match" = "true" ] && [ -n "$preview_host" ]; then
              observed_managed_certificate_domains="$preview_host"
            fi
            observed_managed_certificate_status="$tls_certificate_status"
            observed_managed_certificate_domain_status="$tls_domain_status"
            if [ -z "$cert_resource_name" ]; then
              cert_resource_name="$MBSRN_PREVIEW_CERTIFICATE_NAME"
            fi
            echo "observed_managed_certificate_domains=$observed_managed_certificate_domains"
            echo "observed_managed_certificate_status=$observed_managed_certificate_status"
            echo "observed_managed_certificate_domain_status=$observed_managed_certificate_domain_status"
          }
          cert_eval_output="$(evaluate_managed_certificate "$managed_certificate_json")"
          apply_managed_certificate_eval_output "$cert_eval_output"
          managed_certificate_metadata_available=false
          if [ -n "$observed_managed_certificate_domains" ] || [ -n "$observed_managed_certificate_status" ] || [ -n "$observed_managed_certificate_domain_status" ]; then
            managed_certificate_metadata_available=true
          fi
          if [ "$domain_exact_match" != "true" ]; then
            cert_identity_valid=false
            if [ "$managed_certificate_metadata_available" != "true" ] \
              && [ "$host_reachable" = true ] \
              && [ "$host_reachability_scheme" = "https" ] \
              && [ "$dns_record_matches_ingress" = "true" ] \
              && [ "$managed_cert_annotation_first" = "$expected_cert_name" ]; then
              cert_identity_valid=true
              echo "deploy_runtime_reason_code=managed_certificate_metadata_unavailable"
              echo "deploy_runtime_reason_message=ManagedCertificate metadata unavailable from cluster API; HTTPS certificate identity and ingress annotation evidence are valid."
            else
              if [ "$resource_name_matches_expected" != "true" ]; then
                if [ "$pre_shared_cert_controller_cross_site_evidence" = true ]; then
                  echo "deploy_runtime_reason_code=stale_pre_shared_cert_binding_detected"
                fi
                echo "deploy_runtime_reason_code=tls_certificate_bound_to_wrong_site"
                echo "deploy_runtime_reason_message=ManagedCertificate resource identity does not match expected deterministic certificate name."
                exit 1
              fi
              echo "deploy_runtime_reason_code=managed_certificate_domain_drift_repaired"
              echo "deploy_runtime_reason_message=ManagedCertificate domain drift detected for expected certificate resource; attempting safe delete/recreate repair."
              if ! kubectl delete managedcertificate "$MBSRN_PREVIEW_CERTIFICATE_NAME" --namespace "$K8S_NAMESPACE" --ignore-not-found=true; then
                if [ "$pre_shared_cert_controller_cross_site_evidence" = true ]; then
                  echo "deploy_runtime_reason_code=stale_pre_shared_cert_binding_detected"
                fi
                echo "deploy_runtime_reason_code=managed_certificate_domain_drift_repair_failed"
                echo "deploy_runtime_reason_code=tls_certificate_bound_to_wrong_site"
                echo "deploy_runtime_reason_message=ManagedCertificate domain drift repair could not delete expected certificate resource."
                exit 1
              fi
              if ! kubectl apply -f k8s/managedcertificate.yaml --namespace "$K8S_NAMESPACE"; then
                if [ "$pre_shared_cert_controller_cross_site_evidence" = true ]; then
                  echo "deploy_runtime_reason_code=stale_pre_shared_cert_binding_detected"
                fi
                echo "deploy_runtime_reason_code=managed_certificate_domain_drift_repair_failed"
                echo "deploy_runtime_reason_code=tls_certificate_bound_to_wrong_site"
                echo "deploy_runtime_reason_message=ManagedCertificate domain drift repair could not re-apply expected certificate manifest."
                exit 1
              fi
              kubectl apply -f k8s/ingress.yaml --namespace "$K8S_NAMESPACE" >/dev/null 2>&1 || true
              repair_attempt=1
              repair_max_attempts=20
              repair_sleep_seconds=15
              repair_converged=false
              while [ "$repair_attempt" -le "$repair_max_attempts" ]; do
                managed_certificate_json="$(kubectl get managedcertificate "$MBSRN_PREVIEW_CERTIFICATE_NAME" --namespace "$K8S_NAMESPACE" -o json 2>/dev/null || true)"
                if [ -n "$managed_certificate_json" ]; then
                  cert_eval_output="$(evaluate_managed_certificate "$managed_certificate_json")"
                  apply_managed_certificate_eval_output "$cert_eval_output"
                  if [ -n "$observed_managed_certificate_domains" ] || [ -n "$observed_managed_certificate_status" ] || [ -n "$observed_managed_certificate_domain_status" ]; then
                    managed_certificate_metadata_available=true
                  fi
                  if [ "$domain_exact_match" = "true" ]; then
                    repair_converged=true
                    break
                  fi
                fi
                if [ "$repair_attempt" -lt "$repair_max_attempts" ]; then
                  sleep "$repair_sleep_seconds"
                fi
                repair_attempt=$((repair_attempt + 1))
              done
              if [ "$repair_converged" != "true" ]; then
                if [ "$pre_shared_cert_controller_cross_site_evidence" = true ]; then
                  echo "deploy_runtime_reason_code=stale_pre_shared_cert_binding_detected"
                fi
                echo "deploy_runtime_reason_code=managed_certificate_domain_drift_repair_failed"
                echo "deploy_runtime_reason_code=tls_certificate_bound_to_wrong_site"
                echo "deploy_runtime_reason_message=ManagedCertificate domain drift persisted after safe repair attempt."
                exit 1
              fi
            fi
          fi
          if [ "$domain_exact_match" = "true" ]; then
            cert_identity_valid=true
          fi
          if [ "$managed_certificate_metadata_available" = "true" ] && ( [ "$normalized_domain_status" = "FAILED_NOT_VISIBLE" ] || [ "$normalized_cert_status" = "FAILED_NOT_VISIBLE" ] ); then
            echo "deploy_runtime_reason_code=managed_certificate_failed_not_visible"
            echo "deploy_runtime_reason_message=ManagedCertificate is not visible; verify DNS and load balancer exposure."
            if [ "$dns_record_matches_ingress" != "true" ]; then
              echo "deploy_runtime_reason_code=dns_record_mismatch"
            fi
            exit 1
          fi
          if [ "$managed_certificate_metadata_available" = "true" ] && ( [ "$normalized_domain_status" = "PROVISIONING" ] || [ "$normalized_cert_status" = "PROVISIONING" ] ); then
            set_https_probe_error_summary "managed_certificate_provisioning" "" "" ""
            echo "deploy_runtime_reason_code=managed_certificate_provisioning"
            echo "deploy_runtime_reason_code=managed_certificate_pending"
            echo "deploy_runtime_reason_code=tls_certificate_provisioning"
            echo "deploy_runtime_reason_message=Deploy reached the load balancer, but ManagedCertificate/TLS is still provisioning for expected hostname. Wait for ACTIVE status, then refresh or rerun deploy."
            exit 1
          fi
          if [ "$managed_certificate_metadata_available" = "true" ] && [ "$normalized_domain_status" != "ACTIVE" ]; then
            set_https_probe_error_summary "managed_certificate_provisioning" "" "" ""
            echo "deploy_runtime_reason_code=managed_certificate_provisioning"
            echo "deploy_runtime_reason_code=managed_certificate_pending"
            echo "deploy_runtime_reason_code=tls_certificate_provisioning"
            echo "deploy_runtime_reason_message=ManagedCertificate domain status is not ACTIVE for expected hostname."
            exit 1
          fi
          if [ "$managed_certificate_metadata_available" = "true" ] && [ -n "$normalized_cert_status" ] && [ "$normalized_cert_status" != "ACTIVE" ]; then
            set_https_probe_error_summary "managed_certificate_provisioning" "" "" ""
            echo "deploy_runtime_reason_code=managed_certificate_provisioning"
            echo "deploy_runtime_reason_code=managed_certificate_pending"
            echo "deploy_runtime_reason_code=tls_certificate_provisioning"
            echo "deploy_runtime_reason_message=ManagedCertificate status is not ACTIVE yet."
            exit 1
          fi
          static_ip_alignment_ready=false
          if [ -n "$expected_static_ip_address" ]; then
            if [ "$ingress_status_ip_matches_static_ip" = "true" ] || [ "$static_ip_bound_to_expected_forwarding_rule" = "true" ]; then
              static_ip_alignment_ready=true
            fi
          else
            static_ip_alignment_ready=true
          fi
          control_plane_ready=false
          if [ "$dns_record_matches_ingress" = "true" ] \
            && [ "$cert_identity_valid" = "true" ] \
            && [ "$static_ip_alignment_ready" = "true" ] \
            && [ "$normalized_domain_status" = "ACTIVE" ] \
            && [ "$normalized_cert_status" = "ACTIVE" ]; then
            control_plane_ready=true
          fi
          https_verify_output="$(mktemp)"
          https_probe_attempted=true
          if ! https_verify_code="$(curl --silent --show-error --connect-timeout 5 --max-time 10 --output /dev/null --write-out '%{http_code}' "https://$preview_host" 2>"$https_verify_output")"; then
            https_verify_exit=$?
            if [ "$https_verify_exit" -eq 60 ] || grep -qiE 'SSL certificate problem|SSL_ERROR_BAD_CERT_DOMAIN|certificate subject name|no alternative certificate subject name' "$https_verify_output"; then
              set_https_probe_error_summary "reachable_but_tls_certificate_mismatch" "$https_verify_exit" "" "$https_verify_output"
              if [ "$pre_shared_cert_controller_cross_site_evidence" = true ]; then
                echo "deploy_runtime_reason_code=stale_pre_shared_cert_binding_detected"
              fi
              echo "deploy_runtime_reason_code=tls_certificate_bound_to_wrong_site"
              echo "deploy_runtime_reason_code=reachable_but_tls_certificate_mismatch"
            elif [ "$https_verify_exit" -eq 28 ]; then
              set_https_probe_error_summary "https_probe_timeout" "$https_verify_exit" "" "$https_verify_output"
              echo "deploy_runtime_reason_code=https_probe_timeout"
              if [ "$control_plane_ready" = "true" ]; then
                echo "deploy_runtime_reason_code=https_probe_failed_after_control_plane_ready"
                echo "deploy_runtime_reason_message=DNS, IP, and certificate are ready, but HTTPS probe to preview host timed out."
              fi
            elif [ "$https_verify_exit" -eq 52 ]; then
              set_https_probe_error_summary "https_probe_empty_reply" "$https_verify_exit" "" "$https_verify_output"
              echo "deploy_runtime_reason_code=https_probe_empty_reply"
              if [ "$control_plane_ready" = "true" ]; then
                echo "deploy_runtime_reason_code=https_probe_failed_after_control_plane_ready"
                echo "deploy_runtime_reason_message=DNS, IP, and certificate are ready, but HTTPS probe returned an empty reply."
              fi
            else
              if [ -z "$ingress_status_ip" ] && [ -z "$expected_static_ip_address" ] && [ "$host_reachable" != "true" ]; then
                set_https_probe_error_summary "ingress_address_pending" "$https_verify_exit" "" "$https_verify_output"
                echo "deploy_runtime_reason_code=ingress_address_pending"
              elif [ "$normalized_domain_status" = "PROVISIONING" ] || [ "$normalized_cert_status" = "PROVISIONING" ]; then
                set_https_probe_error_summary "managed_certificate_provisioning" "$https_verify_exit" "" "$https_verify_output"
                echo "deploy_runtime_reason_code=managed_certificate_provisioning"
                echo "deploy_runtime_reason_code=tls_certificate_provisioning"
                echo "deploy_runtime_reason_message=Deploy reached the load balancer, but ManagedCertificate/TLS is still provisioning for expected hostname. Wait for ACTIVE status, then refresh or rerun deploy."
              elif [ "$control_plane_ready" = "true" ]; then
                set_https_probe_error_summary "https_probe_failed_after_control_plane_ready" "$https_verify_exit" "" "$https_verify_output"
                echo "deploy_runtime_reason_code=https_probe_failed_after_control_plane_ready"
                echo "deploy_runtime_reason_message=DNS, IP, and certificate are ready, but HTTPS probe to preview host is not yet successful. Check load balancer backend health, service endpoints, and app runtime readiness."
              else
                set_https_probe_error_summary "https_probe_failed" "$https_verify_exit" "" "$https_verify_output"
                echo "deploy_runtime_reason_code=https_probe_failed"
              fi
            fi
            cat "$https_verify_output"
            rm -f "$https_verify_output"
            exit 1
          fi
          rm -f "$https_verify_output"
          preview_https_status="$https_verify_code"
          if ! echo "$https_verify_code" | grep -Eq '^[1-5][0-9][0-9]$'; then
            if [ "$control_plane_ready" = "true" ]; then
              set_https_probe_error_summary "https_probe_failed_after_control_plane_ready" "" "$https_verify_code" ""
              echo "deploy_runtime_reason_code=https_probe_failed_after_control_plane_ready"
              echo "deploy_runtime_reason_message=DNS, IP, and certificate are ready, but HTTPS probe to the preview host is not yet successful. Check load balancer backend health, service endpoints, and app runtime readiness."
            else
              set_https_probe_error_summary "https_probe_failed" "" "$https_verify_code" ""
              echo "deploy_runtime_reason_code=https_probe_failed"
              echo "deploy_runtime_reason_message=HTTPS probe did not return a valid HTTP status code."
            fi
            exit 1
          fi
          if [ "$https_verify_code" = "502" ]; then
            backend_502_detected=true
            set_https_probe_error_summary "ingress_backend_502" "" "$https_verify_code" ""
            echo "deploy_runtime_reason_code=ingress_backend_502"
            collect_ingress_502_runtime_diagnostics
            if [ "$gce_backend_health_status" = "HEALTHY" ] && [ "$service_probe_status" = "ok" ] && [ "$preview_https_status" = "502" ]; then
              echo "deploy_runtime_reason_message=Preview hostname is reachable but returns HTTP 502 while GCE backend reports HEALTHY and in-cluster probes succeed. Likely ingress/LB edge convergence or stale backend path."
            elif [ "$service_probe_status" = "http_502" ] || [ "$endpoint_probe_status" = "http_502" ]; then
              echo "deploy_runtime_reason_message=Preview hostname is reachable but returns HTTP 502 and in-cluster service/endpoint probes also return 502. Likely app runtime response failure."
            elif [ "$pod_restart_detected" = true ]; then
              echo "deploy_runtime_reason_message=Preview hostname is reachable but returns HTTP 502 with pod restart/crash evidence. Likely pod runtime instability."
            else
              echo "deploy_runtime_reason_message=HTTPS probe reached ingress but backend returned 502. Review pod logs, in-cluster service probe status, endpoint probe status, and backend health evidence."
            fi
            exit 1
          fi
          if echo "$https_verify_code" | grep -Eq '^5[0-9][0-9]$'; then
            if [ "$control_plane_ready" = "true" ]; then
              set_https_probe_error_summary "https_probe_failed_after_control_plane_ready" "" "$https_verify_code" ""
              echo "deploy_runtime_reason_code=https_probe_failed_after_control_plane_ready"
              echo "deploy_runtime_reason_message=DNS, IP, and certificate are ready, but HTTPS probe to the preview host is not yet successful. Check load balancer backend health, service endpoints, and app runtime readiness."
            else
              set_https_probe_error_summary "https_probe_failed" "" "$https_verify_code" ""
              echo "deploy_runtime_reason_code=https_probe_failed"
              echo "deploy_runtime_reason_message=HTTPS probe returned 5xx before backend reached ready state."
            fi
            exit 1
          fi
          if echo "$https_verify_code" | grep -Eq '^4[0-9][0-9]$'; then
            if [ "$control_plane_ready" = "true" ]; then
              set_https_probe_error_summary "https_probe_failed_after_control_plane_ready" "" "$https_verify_code" ""
              echo "deploy_runtime_reason_code=https_probe_failed_after_control_plane_ready"
              echo "deploy_runtime_reason_message=DNS, IP, and certificate are ready, but HTTPS probe to the preview host is not yet successful. Check load balancer backend health, service endpoints, and app runtime readiness."
            else
              set_https_probe_error_summary "https_probe_failed" "" "$https_verify_code" ""
              echo "deploy_runtime_reason_code=https_probe_failed"
            fi
            exit 1
          fi
          deploy_https_ready=true
          live_url="https://$preview_host"
          {
            echo "live_url=$live_url"
            echo "resolved_live_url=$live_url"
            echo "deployed_url=$live_url"
            echo "dns_record_matches_ingress=$dns_record_matches_ingress"
            echo "dns_expected_ip=$dns_expected_ip"
            echo "dns_observed_ip=$dns_observed_ip"
            echo "expected_static_ip_address=$expected_static_ip_address"
            echo "static_ip_status=$static_ip_status"
            echo "static_ip_users=$static_ip_users"
            echo "tls_certificate_status=$tls_certificate_status"
            echo "tls_domain_status=$tls_domain_status"
            echo "managed_certificate_resource_name=$MBSRN_PREVIEW_CERTIFICATE_NAME"
            echo "observed_managed_certificate_domains=$observed_managed_certificate_domains"
            echo "observed_managed_certificate_status=$observed_managed_certificate_status"
            echo "observed_managed_certificate_domain_status=$observed_managed_certificate_domain_status"
            echo "ingress_status_ip=$ingress_status_ip"
            echo "ingress_status_ip_matches_static_ip=$ingress_status_ip_matches_static_ip"
            echo "static_ip_bound_to_expected_forwarding_rule=$static_ip_bound_to_expected_forwarding_rule"
            echo "ingress_ip=$ingress_ip"
            echo "ingress_conflict_detected=$ingress_conflict_detected"
            echo "cert_identity_valid=$cert_identity_valid"
            echo "host_reachable=$host_reachable"
            echo "host_reachability_scheme=$host_reachability_scheme"
            echo "https_probe_error_summary=$https_probe_error_summary"
            echo "deploy_https_ready=$deploy_https_ready"
            echo "preview_https_status=$preview_https_status"
            echo "preview_http_status=$preview_http_status"
            echo "preview_probe_attempt=$preview_probe_attempt"
            echo "preview_probe_elapsed_seconds=$preview_probe_elapsed_seconds"
            echo "gce_backend_health_status=$gce_backend_health_status"
            echo "k8s_endpoint_ready=$k8s_endpoint_ready"
            echo "service_probe_status=$service_probe_status"
            echo "in_cluster_service_status_code=$in_cluster_service_status_code"
            echo "endpoint_probe_status=$endpoint_probe_status"
            echo "endpoint_probe_status_code=$endpoint_probe_status_code"
            echo "runtime_probe_status=$runtime_probe_status"
            echo "pod_restart_detected=$pod_restart_detected"
          } >> "$GITHUB_OUTPUT"
      - name: Emit managed deployment metadata
        run: |
          echo "MBSRN managed deploy workflow: deploy-mbsrn-www-www-prod.yml"
          echo "Repository: mhanson13/mbsrn-www"
          echo "Branch: main"
          echo "Kubernetes namespace: mbsrn-www"
          echo "Namespace source: repo-name"
          echo "Target environment key: gke-prod"
          echo "Target environment source: admin_config"
          echo "Site identity: df16ee39-faa4-4af4-ae16-36aeb5d1288b"
          echo "Preview hostname: $MBSRN_PREVIEW_HOSTNAME"
          echo "Preview certificate name: $MBSRN_PREVIEW_CERTIFICATE_NAME"
          echo "FrontendConfig name: $MBSRN_FRONTEND_CONFIG_NAME"
          echo "BackendConfig name: $MBSRN_BACKEND_CONFIG_NAME"
          echo "Site runtime image: ${{ steps.resolve_site_runtime_image.outputs.site_runtime_image_reference }}"
          echo "Site runtime image selection mode: ${{ steps.resolve_site_runtime_image.outputs.site_runtime_image_selection_mode }}"
          echo "Site runtime image repository: ${{ steps.resolve_site_runtime_image.outputs.site_runtime_image_repository }}"
          echo "Site runtime image tag: ${{ steps.resolve_site_runtime_image.outputs.site_runtime_image_tag }}"
          echo "Site runtime source commit: ${{ steps.resolve_site_runtime_image.outputs.site_runtime_source_commit }}"
          echo "Site runtime content source: ${{ steps.resolve_site_runtime_image.outputs.site_runtime_content_source }}"
