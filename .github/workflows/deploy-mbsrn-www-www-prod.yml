# mbsrn-managed-template:site_repo_template_v1
# mbsrn-workflow-signature: 78dc139be598bc03a57f47e2ca51c156be04138aff6053101358c211240e24fe
name: MBSRN Deploy mbsrn-www

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      live_url: ${{ steps.resolve_live_url.outputs.live_url }}
      resolved_live_url: ${{ steps.resolve_live_url.outputs.resolved_live_url }}
      deployed_url: ${{ steps.resolve_live_url.outputs.deployed_url }}
      host_reachable: ${{ steps.resolve_live_url.outputs.host_reachable }}
      host_reachability_scheme: ${{ steps.resolve_live_url.outputs.host_reachability_scheme }}
      dns_record_matches_ingress: ${{ steps.resolve_live_url.outputs.dns_record_matches_ingress }}
      dns_expected_ip: ${{ steps.resolve_live_url.outputs.dns_expected_ip }}
      dns_observed_ip: ${{ steps.resolve_live_url.outputs.dns_observed_ip }}
      expected_static_ip_address: ${{ steps.resolve_live_url.outputs.expected_static_ip_address }}
      static_ip_status: ${{ steps.resolve_live_url.outputs.static_ip_status }}
      static_ip_users: ${{ steps.resolve_live_url.outputs.static_ip_users }}
      tls_certificate_status: ${{ steps.resolve_live_url.outputs.tls_certificate_status }}
      tls_domain_status: ${{ steps.resolve_live_url.outputs.tls_domain_status }}
      ingress_status_ip: ${{ steps.resolve_live_url.outputs.ingress_status_ip }}
      ingress_status_ip_matches_static_ip: ${{ steps.resolve_live_url.outputs.ingress_status_ip_matches_static_ip }}
      static_ip_bound_to_expected_forwarding_rule: ${{ steps.resolve_live_url.outputs.static_ip_bound_to_expected_forwarding_rule }}
      ingress_ip: ${{ steps.resolve_live_url.outputs.ingress_ip }}
      ingress_conflict_detected: ${{ steps.resolve_live_url.outputs.ingress_conflict_detected }}
      cert_identity_valid: ${{ steps.resolve_live_url.outputs.cert_identity_valid }}
      https_probe_error_summary: ${{ steps.resolve_live_url.outputs.https_probe_error_summary }}
      deploy_https_ready: ${{ steps.resolve_live_url.outputs.deploy_https_ready }}
      site_runtime_image_reference: ${{ steps.resolve_site_runtime_image.outputs.site_runtime_image_reference }}
      site_runtime_image_selection_mode: ${{ steps.resolve_site_runtime_image.outputs.site_runtime_image_selection_mode }}
      site_runtime_image_repository: ${{ steps.resolve_site_runtime_image.outputs.site_runtime_image_repository }}
      site_runtime_image_tag: ${{ steps.resolve_site_runtime_image.outputs.site_runtime_image_tag }}
      site_runtime_source_commit: ${{ steps.resolve_site_runtime_image.outputs.site_runtime_source_commit }}
      site_runtime_content_source: ${{ steps.resolve_site_runtime_image.outputs.site_runtime_content_source }}
    environment:
      name: gke-prod
      url: ${{ steps.resolve_live_url.outputs.resolved_live_url }}
    env:
      K8S_NAMESPACE: mbsrn-www
      MBSRN_NAMESPACE_SOURCE: repo-name
      MBSRN_TARGET_ENVIRONMENT_KEY: gke-prod
      MBSRN_TARGET_ENVIRONMENT_SOURCE: admin_config
      MBSRN_SITE_IDENTITY: df16ee39-faa4-4af4-ae16-36aeb5d1288b
      MBSRN_PREVIEW_HOSTNAME: mbsrn-www.site.mbsrn.com
      MBSRN_PREVIEW_CERTIFICATE_NAME: site-web-preview-cert-mbsrn-www
      MBSRN_PREVIEW_STATIC_IP_NAME: site-web-preview-ip-mbsrn-www
      MBSRN_FRONTEND_CONFIG_NAME: site-web-frontend-config-mbsrn-www
      MBSRN_BACKEND_CONFIG_NAME: site-web-backend-config-mbsrn-www
      SITE_WEB_IMAGE_REPOSITORY: ghcr.io/mhanson13/mbsrn-www-site-web
      SITE_WEB_IMAGE_TAG: ${{ vars.MBSRN_SITE_WEB_IMAGE_TAG || vars.SITE_WEB_IMAGE_TAG || secrets.MBSRN_SITE_WEB_IMAGE_TAG || secrets.SITE_WEB_IMAGE_TAG || '' }}
      PRIVATE_IMAGE_AUTH_REQUIRED: "true"
      GKE_CLUSTER_NAME: 'mbsrn-prod'
      GKE_CLUSTER_LOCATION: 'us-central1'
      GKE_PROJECT_ID: 'mbsrn-prod'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Prepare managed site runtime build context
        run: |
          set -euo pipefail
          rm -rf site-runtime/context
          mkdir -p site-runtime/context
          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'k8s/' \
            --exclude 'site-runtime/' \
            --exclude 'mbsrn.key' \
            --exclude 'README.md' \
            --exclude 'LICENSE' \
            --exclude '.gitignore' \
            ./ site-runtime/context/
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push managed site runtime image
        uses: docker/build-push-action@v6
        with:
          context: site-runtime
          file: site-runtime/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.SITE_WEB_IMAGE_REPOSITORY }}:${{ github.sha }}
            ${{ env.SITE_WEB_IMAGE_REPOSITORY }}:latest
      - name: Validate GCP credentials
        run: |
          if [ -z "${{ secrets.GCP_DEPLOY_KEY }}" ]; then
            echo "Missing GCP_DEPLOY_KEY secret"
            exit 1
          fi
      - name: Validate GKE environment config
        run: |
          if [ -z "$GKE_CLUSTER_NAME" ]; then
            echo "Missing managed GKE cluster name (admin config or legacy repo fallback)."
            exit 1
          fi
          if [ -z "$GKE_CLUSTER_LOCATION" ]; then
            echo "Missing managed GKE cluster location (admin config or legacy repo fallback)."
            exit 1
          fi
          if [ -z "$GKE_PROJECT_ID" ]; then
            echo "Missing managed GKE project id (admin config or legacy repo fallback)."
            exit 1
          fi
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_DEPLOY_KEY }}
          create_credentials_file: true
          export_environment_variables: true
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_CLUSTER_LOCATION }}
          project_id: ${{ env.GKE_PROJECT_ID }}
      - name: Verify expected per-site static IP exists
        run: |
          set -euo pipefail
          if ! gcloud compute addresses describe "$MBSRN_PREVIEW_STATIC_IP_NAME" --global --project "$GKE_PROJECT_ID" >/dev/null 2>&1; then
            echo "deploy_runtime_reason_code=managed_site_static_ip_missing"
            echo "deploy_runtime_reason_message=Expected per-site static IP must be created and assigned by admin before deploy."
            echo "expected_static_ip_name=$MBSRN_PREVIEW_STATIC_IP_NAME"
            echo "gcp_project_id=$GKE_PROJECT_ID"
            exit 1
          fi
      - name: Ensure namespace exists
        run: kubectl apply -f k8s/namespace.yaml
      - name: Verify GHCR image pull secret
        run: |
          set -euo pipefail
          kubectl get secret ghcr-pull-secret --namespace "$K8S_NAMESPACE"
      - name: Reset stale site-web deployment
        run: |
          echo "Resetting deployment to eliminate stale image references."
          kubectl delete deployment site-web --namespace "$K8S_NAMESPACE" --ignore-not-found
      - name: Apply managed manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/
      - name: Resolve managed site runtime image
        id: resolve_site_runtime_image
        run: |
          set -euo pipefail
          selected_mode="immutable_sha"
          selected_image="${SITE_WEB_IMAGE_REPOSITORY}:${GITHUB_SHA}"
          normalized_tag="$(echo "${SITE_WEB_IMAGE_TAG:-}" | tr -d '[:space:]')"
          if [ -n "$normalized_tag" ] && [ "$normalized_tag" != "latest" ]; then
            if echo "$normalized_tag" | grep -Eq '^[A-Fa-f0-9]{7,64}$'; then
              candidate_image="${SITE_WEB_IMAGE_REPOSITORY}:${normalized_tag}"
              selected_image="$candidate_image"
              selected_mode="immutable_sha"
            else
              echo "Configured SITE_WEB_IMAGE_TAG '$normalized_tag' is not a SHA-like tag; falling back to latest."
              selected_image="${SITE_WEB_IMAGE_REPOSITORY}:latest"
              selected_mode="fallback_latest"
            fi
          elif [ "$normalized_tag" = "latest" ]; then
            selected_image="${SITE_WEB_IMAGE_REPOSITORY}:latest"
            selected_mode="fallback_latest"
          fi
          echo "Managed site runtime image selected: ${selected_image} (mode=${selected_mode})"
          kubectl set image deployment/site-web site-web="${selected_image}" --namespace "$K8S_NAMESPACE"
          selected_repo="${selected_image}"
          if echo "$selected_repo" | grep -q '@'; then
            selected_repo="${selected_repo%%@*}"
            selected_tag="digest"
          else
            selected_tag="latest"
            if echo "$selected_repo" | grep -q ':'; then
              selected_tag="${selected_repo##*:}"
              selected_repo="${selected_repo%:*}"
            fi
          fi
          {
            echo "site_runtime_image_reference=${selected_image}"
            echo "site_runtime_image_selection_mode=${selected_mode}"
            echo "site_runtime_image_repository=${selected_repo}"
            echo "site_runtime_image_tag=${selected_tag}"
            echo "site_runtime_source_commit=${GITHUB_SHA}"
            echo "site_runtime_content_source=site_repo_build"
          } >> "$GITHUB_OUTPUT"
      - name: Verify rollout
        run: |
          set -euo pipefail
          if ! kubectl rollout status deployment/site-web --namespace "$K8S_NAMESPACE" --timeout=180s; then
            echo "site-web rollout timed out in namespace $K8S_NAMESPACE; collecting bounded diagnostics."
            kubectl get deployment site-web --namespace "$K8S_NAMESPACE" -o wide || true
            kubectl get rs --namespace "$K8S_NAMESPACE" -o wide || true
            kubectl get pods --namespace "$K8S_NAMESPACE" -o wide || true
            kubectl get service site-web --namespace "$K8S_NAMESPACE" -o wide || true
            kubectl get endpoints site-web --namespace "$K8S_NAMESPACE" -o wide || true
            kubectl get endpointslice --namespace "$K8S_NAMESPACE" -l kubernetes.io/service-name=site-web -o wide || true
            deployment_describe_output="$(mktemp)"
            kubectl describe deployment site-web --namespace "$K8S_NAMESPACE" > "$deployment_describe_output" 2>&1 || true
            cat "$deployment_describe_output"
            describe_pods_output="$(mktemp)"
            kubectl describe pods --namespace "$K8S_NAMESPACE" -l app.kubernetes.io/name=site-web > "$describe_pods_output" 2>&1 || true
            cat "$describe_pods_output"
            service_describe_output="$(mktemp)"
            kubectl describe service site-web --namespace "$K8S_NAMESPACE" > "$service_describe_output" 2>&1 || true
            cat "$service_describe_output"
            ingress_describe_output="$(mktemp)"
            kubectl describe ingress site-web --namespace "$K8S_NAMESPACE" > "$ingress_describe_output" 2>&1 || true
            cat "$ingress_describe_output"
            managedcertificate_describe_output="$(mktemp)"
            kubectl describe managedcertificate "$MBSRN_PREVIEW_CERTIFICATE_NAME" --namespace "$K8S_NAMESPACE" > "$managedcertificate_describe_output" 2>&1 || true
            cat "$managedcertificate_describe_output"
            backendconfig_describe_output="$(mktemp)"
            kubectl describe backendconfig "$MBSRN_BACKEND_CONFIG_NAME" --namespace "$K8S_NAMESPACE" > "$backendconfig_describe_output" 2>&1 || true
            cat "$backendconfig_describe_output"
            endpoints_output="$(mktemp)"
            kubectl get endpoints site-web --namespace "$K8S_NAMESPACE" -o yaml > "$endpoints_output" 2>&1 || true
            cat "$endpoints_output"
            endpointslice_output="$(mktemp)"
            kubectl get endpointslice --namespace "$K8S_NAMESPACE" -l kubernetes.io/service-name=site-web -o yaml > "$endpointslice_output" 2>&1 || true
            cat "$endpointslice_output"
            image_pull_detected=false
            image_pull_secret_missing_detected=false
            private_image_pull_forbidden_detected=false
            public_image_pull_failed_detected=false
            service_no_ready_endpoints_detected=false
            ingress_backend_unhealthy_detected=false
            pod_ready_detected=false
            private_image_auth_required="${PRIVATE_IMAGE_AUTH_REQUIRED:-false}"
            if grep -qiE 'ImagePullBackOff|ErrImagePull|pull access denied|manifest unknown|Failed to pull image' "$describe_pods_output"; then
              image_pull_detected=true
              echo "Likely rollout blocker: image pull backoff."
            fi
            if grep -qiE 'FailedToRetrieveImagePullSecret|image pull secret.*not found|pull secret.*not found|secret ".*" not found.*(pull|image)' "$describe_pods_output"; then
              if [ "$private_image_auth_required" = "true" ]; then
                image_pull_detected=true
                image_pull_secret_missing_detected=true
                echo "Likely rollout blocker: image pull secret missing."
              fi
            fi
            if grep -qiE 'failed to fetch anonymous token|403[[:space:]]+Forbidden|unauthorized|authentication required' "$describe_pods_output"; then
              image_pull_detected=true
              if [ "$private_image_auth_required" = "true" ]; then
                private_image_pull_forbidden_detected=true
                echo "Likely rollout blocker: private image pull forbidden."
                if [ "$image_pull_secret_missing_detected" = false ]; then
                  echo "Likely rollout blocker: image pull secret not referenced."
                fi
              else
                public_image_pull_failed_detected=true
                echo "Likely rollout blocker: public image pull failed."
              fi
            fi
            if grep -qiE 'Ready:[[:space:]]+True|ContainersReady[[:space:]]+True|Condition[[:space:]]+Ready[[:space:]]+True' "$describe_pods_output"; then
              pod_ready_detected=true
            fi
            if grep -qiE 'endpoints:[[:space:]]*<none>|subsets:[[:space:]]*\[\]|addresses:[[:space:]]*\[\]|notreadyaddresses|no endpoints available' "$service_describe_output" "$endpoints_output" "$endpointslice_output"; then
              service_no_ready_endpoints_detected=true
              echo "Likely rollout blocker: service has no ready endpoints."
              echo "deploy_runtime_reason_code=service_has_no_ready_endpoints"
              echo "deploy_runtime_reason_code=service_endpoint_missing"
            fi
            if grep -qiE 'ingress backend.*unhealthy|backend service.*unhealthy|backend.*degraded mode|neg.*degraded mode|unhealthy backends' "$deployment_describe_output" "$describe_pods_output" "$ingress_describe_output"; then
              ingress_backend_unhealthy_detected=true
              echo "Likely rollout blocker: ingress backend unhealthy."
              echo "deploy_runtime_reason_code=ingress_backend_unhealthy"
              echo "deploy_runtime_reason_code=ingress_backend_unhealthy_after_rollout"
            fi
            if grep -qiE '502|bad gateway' "$ingress_describe_output" "$service_describe_output"; then
              echo "Likely rollout blocker: ingress backend 502."
              echo "deploy_runtime_reason_code=ingress_backend_502"
            fi
            if [ "$pod_ready_detected" = true ] && [ "$ingress_backend_unhealthy_detected" = true ]; then
              echo "Likely rollout blocker: pod ready but ingress backend unhealthy."
              echo "deploy_runtime_reason_code=pod_ready_but_ingress_backend_unhealthy"
              echo "deploy_runtime_reason_code=service_endpoint_unhealthy"
            fi
            if grep -qiE 'backendconfig.*healthcheck|healthcheck.*path|health check.*path|requestpath' "$deployment_describe_output" "$describe_pods_output" "$backendconfig_describe_output"; then
              echo "Likely rollout blocker: backendconfig health check mismatch."
              echo "deploy_runtime_reason_code=backendconfig_health_check_mismatch"
              echo "deploy_runtime_reason_code=backend_config_healthcheck_unhealthy"
            fi
            if grep -qiE 'failednotvisible' "$managedcertificate_describe_output"; then
              echo "Likely rollout blocker: managed certificate failed visibility checks."
              echo "deploy_runtime_reason_code=managed_certificate_failed_not_visible"
            fi
            if grep -qiE 'in-use and would result in a conflict|global static ip.*conflict|specified ip address is in-use' "$ingress_describe_output"; then
              echo "Likely rollout blocker: ingress static IP conflict."
              echo "deploy_runtime_reason_code=ingress_static_ip_conflict"
            fi
            if grep -qiE 'ingress\.gcp\.kubernetes\.io/pre-shared-cert' "$ingress_describe_output"; then
              echo "Observed ingress pre-shared certificate controller metadata; verify managed-certificate desired-state evidence."
              echo "deploy_runtime_reason_code=pre_shared_cert_metadata_mismatch"
            fi
            if [ "$image_pull_secret_missing_detected" = true ]; then
              echo "deploy_runtime_reason_code=image_pull_secret_missing"
            elif [ "$private_image_pull_forbidden_detected" = true ]; then
              echo "deploy_runtime_reason_code=private_image_pull_forbidden"
            elif [ "$public_image_pull_failed_detected" = true ]; then
              echo "deploy_runtime_reason_code=public_image_pull_failed"
            fi
            if grep -qiE 'manifest unknown|name unknown|[Ii]magePullBackOff.*not found|[Ff]ailed to pull image.*not found|ghcr\.io/.+:.*not found' "$describe_pods_output"; then
              image_pull_detected=true
              echo "Likely rollout blocker: container image not found in registry."
            fi
            container_started_evidence=false
            if grep -qiE 'Container ID:|Started:[[:space:]]+true|State:[[:space:]]+(Running|Terminated)' "$describe_pods_output"; then
              container_started_evidence=true
            fi
            crash_direct_evidence=false
            if grep -qiE 'CrashLoopBackOff|Back-off restarting failed container|OOMKilled|terminated with exit code|Last State:[[:space:]]+Terminated|Reason:[[:space:]]+Error' "$describe_pods_output"; then
              crash_direct_evidence=true
            fi
            probe_direct_evidence=false
            if grep -qiE 'Readiness probe failed|Liveness probe failed|Startup probe failed|Unhealthy|Probe errored' "$describe_pods_output"; then
              probe_direct_evidence=true
            fi
            # Suppress crash/probe hints when current describe evidence shows image-pull blockers.
            if [ "$image_pull_detected" = false ] && [ "$container_started_evidence" = true ] && [ "$crash_direct_evidence" = true ]; then
              echo "Likely rollout blocker: pod crash/failing container startup."
            fi
            if [ "$image_pull_detected" = false ] && [ "$container_started_evidence" = true ] && [ "$probe_direct_evidence" = true ]; then
              echo "Likely rollout blocker: readiness/liveness probe failure."
            fi
            if grep -qiE 'CreateContainerConfigError|CreateContainerError|secret ".*" not found|configmap ".*" not found' "$describe_pods_output"; then
              echo "Likely rollout blocker: config or secret reference failure."
            fi
            if grep -qiE 'exceeded quota|FailedCreate|forbidden: exceeded quota|requested: requests\.(memory|cpu)|limited: requests\.(memory|cpu)|limited: limits\.' "$deployment_describe_output" "$describe_pods_output"; then
              echo "Likely rollout blocker: namespace ResourceQuota rejection."
            fi
            if grep -qiE 'FailedScheduling|Insufficient|didn.t match Pod.s node affinity|taint|node.s had' "$describe_pods_output"; then
              echo "Likely rollout blocker: scheduling or resource availability issue."
            fi
            rm -f "$deployment_describe_output"
            rm -f "$describe_pods_output"
            rm -f "$service_describe_output"
            rm -f "$ingress_describe_output"
            rm -f "$managedcertificate_describe_output"
            rm -f "$backendconfig_describe_output"
            rm -f "$endpoints_output"
            rm -f "$endpointslice_output"
            recent_pods="$(kubectl get pods --namespace "$K8S_NAMESPACE" -l app.kubernetes.io/name=site-web --sort-by=.metadata.creationTimestamp -o name 2>/dev/null | tail -n 3)"
            if [ -n "$recent_pods" ]; then
              for pod in $recent_pods; do
                echo "--- recent logs: $pod ---"
                kubectl logs --namespace "$K8S_NAMESPACE" "$pod" -c site-web --tail=200 || kubectl logs --namespace "$K8S_NAMESPACE" "$pod" --tail=200 || true
              done
            fi
            exit 1
          fi
      - name: Verify service and ingress
        run: |
          set -euo pipefail
          kubectl get service site-web --namespace "$K8S_NAMESPACE"
          kubectl get ingress site-web --namespace "$K8S_NAMESPACE"
          kubectl get service site-web --namespace "$K8S_NAMESPACE" -o yaml
          kubectl get endpoints site-web --namespace "$K8S_NAMESPACE" -o yaml
          kubectl get endpointslice --namespace "$K8S_NAMESPACE" -l kubernetes.io/service-name=site-web -o yaml || true
          kubectl describe service site-web --namespace "$K8S_NAMESPACE" || true
          kubectl describe ingress site-web --namespace "$K8S_NAMESPACE" || true
          kubectl describe managedcertificate "$MBSRN_PREVIEW_CERTIFICATE_NAME" --namespace "$K8S_NAMESPACE" || true
          kubectl describe backendconfig "$MBSRN_BACKEND_CONFIG_NAME" --namespace "$K8S_NAMESPACE" || true
          endpoint_count="$(kubectl get endpoints site-web --namespace "$K8S_NAMESPACE" -o jsonpath='{range .subsets[*].addresses[*]}x{end}' 2>/dev/null | wc -c | tr -d '[:space:]')"
          if [ -z "$endpoint_count" ] || [ "$endpoint_count" -eq 0 ]; then
            echo "deploy_runtime_reason_code=service_endpoint_missing"
            echo "deploy_runtime_reason_code=service_has_no_ready_endpoints"
            echo "deploy_runtime_reason_message=Service has no ready endpoints after rollout."
            exit 1
          fi
          probe_max_attempts=20
          probe_sleep_seconds=15
          probe_attempt=1
          probe_success=false
          convergence_reason_reported=false
          in_cluster_probe_timeout_detected=false
          last_probe_pod=""
          last_probe_output=""
          while [ "$probe_attempt" -le "$probe_max_attempts" ]; do
            probe_pod="site-web-healthcheck-${GITHUB_RUN_ID:-run}-${GITHUB_RUN_ATTEMPT:-1}-${probe_attempt}"
            probe_pod="$(echo "$probe_pod" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-' | cut -c1-63)"
            if [ -z "$probe_pod" ]; then
              probe_pod="site-web-healthcheck-${probe_attempt}"
            fi
            last_probe_pod="$probe_pod"
            kubectl delete pod "$probe_pod" --namespace "$K8S_NAMESPACE" --ignore-not-found || true
            if [ -n "$last_probe_output" ] && [ -f "$last_probe_output" ]; then
              rm -f "$last_probe_output"
            fi
            probe_output="$(mktemp)"
            if kubectl run "$probe_pod" --namespace "$K8S_NAMESPACE" --image=curlimages/curl:8.10.1 --restart=Never --attach --command -- sh -c "curl -sS -f --connect-timeout 5 --max-time 15 http://site-web.${K8S_NAMESPACE}.svc.cluster.local:80/ >/dev/null" >"$probe_output" 2>&1; then
              probe_success=true
              rm -f "$probe_output"
              last_probe_output=""
              kubectl delete pod "$probe_pod" --namespace "$K8S_NAMESPACE" --ignore-not-found || true
              break
            fi
            cat "$probe_output" || true
            if grep -qiE 'curl: \(28\)|timed out|timeout was reached|failed to connect' "$probe_output"; then
              in_cluster_probe_timeout_detected=true
            fi
            last_probe_output="$probe_output"
            if [ "$probe_attempt" -lt "$probe_max_attempts" ]; then
              kubectl delete pod "$probe_pod" --namespace "$K8S_NAMESPACE" --ignore-not-found || true
              if [ "$convergence_reason_reported" = false ]; then
                echo "deploy_runtime_reason_code=service_probe_waiting_for_convergence"
                convergence_reason_reported=true
              fi
              echo "In-cluster service probe attempt ${probe_attempt}/${probe_max_attempts} failed; retrying in ${probe_sleep_seconds}s."
              sleep "$probe_sleep_seconds"
            fi
            probe_attempt=$((probe_attempt + 1))
          done
          if [ "$probe_success" != true ]; then
            if [ "$in_cluster_probe_timeout_detected" = true ]; then
              echo "deploy_runtime_reason_code=in_cluster_service_probe_timeout"
              echo "deploy_runtime_reason_code=network_policy_may_block_service_probe"
            fi
            echo "deploy_runtime_reason_code=in_cluster_service_curl_failed_after_retries"
            echo "deploy_runtime_reason_code=in_cluster_service_curl_failed"
            echo "deploy_runtime_reason_code=service_endpoint_unhealthy"
            echo "deploy_runtime_reason_code=ingress_backend_unhealthy_after_rollout"
            echo "deploy_runtime_reason_message=In-cluster service endpoint check failed after bounded retries."
            kubectl get networkpolicy --namespace "$K8S_NAMESPACE" -o yaml || true
            kubectl describe networkpolicy --namespace "$K8S_NAMESPACE" || true
            latest_site_web_pod="$(kubectl get pods --namespace "$K8S_NAMESPACE" -l app.kubernetes.io/name=site-web --sort-by=.metadata.creationTimestamp -o name 2>/dev/null | tail -n 1 | sed 's#^pod/##')"
            if [ -n "$latest_site_web_pod" ]; then
              kubectl get pod "$latest_site_web_pod" --namespace "$K8S_NAMESPACE" --show-labels || true
            fi
            kubectl get service site-web --namespace "$K8S_NAMESPACE" -o jsonpath='selector={.spec.selector}{"\n"}ports={range .spec.ports[*]}{.name}:{.port}->{.targetPort}{"\n"}{end}' || true
            kubectl get endpoints site-web --namespace "$K8S_NAMESPACE" -o yaml || true
            kubectl get endpointslice --namespace "$K8S_NAMESPACE" -l kubernetes.io/service-name=site-web -o yaml || true
            if [ -n "$last_probe_output" ] && [ -f "$last_probe_output" ]; then
              rm -f "$last_probe_output"
            fi
            if [ -n "$last_probe_pod" ]; then
              kubectl logs "$last_probe_pod" --namespace "$K8S_NAMESPACE" --tail=200 || true
              kubectl delete pod "$last_probe_pod" --namespace "$K8S_NAMESPACE" --ignore-not-found || true
            fi
            exit 1
          fi
      - name: Resolve live URL from ingress status
        id: resolve_live_url
        run: |
          set -euo pipefail
          max_attempts=40
          sleep_seconds=15
          wait_seconds=$((max_attempts * sleep_seconds))
          resolve_started_at="$(date +%s)"
