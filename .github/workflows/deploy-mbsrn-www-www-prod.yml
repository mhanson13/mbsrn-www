              fallback_detail="managed_certificate_not_active_or_identity_mismatch"
            else
              fallback_reason="https_probe_not_attempted"
              fallback_detail="https_probe_not_attempted"
            fi
            https_probe_error_summary="reason=$fallback_reason;detail=$fallback_detail"
            if [ "${https_probe_attempted:-false}" = "true" ]; then
              https_probe_error_summary="$https_probe_error_summary;http_fallback_attempted=${http_fallback_attempted:-false}"
            fi
            https_probe_error_summary="$(echo "$https_probe_error_summary" | tr -d '\r' | cut -c1-240)"
          }
          emit_resolve_live_url_state() {
            ensure_https_probe_error_summary
            echo "resolve_live_url_state_host_reachable=$host_reachable"
            echo "resolve_live_url_state_host_reachability_scheme=$host_reachability_scheme"
            echo "resolve_live_url_state_live_url=$live_url"
            echo "resolve_live_url_state_dns_record_matches_ingress=$dns_record_matches_ingress"
            echo "resolve_live_url_state_dns_expected_ip=$dns_expected_ip"
            echo "resolve_live_url_state_dns_observed_ip=$dns_observed_ip"
            echo "resolve_live_url_state_expected_static_ip_address=$expected_static_ip_address"
            echo "resolve_live_url_state_static_ip_status=$static_ip_status"
            echo "resolve_live_url_state_static_ip_users=$static_ip_users"
            echo "resolve_live_url_state_ingress_status_ip=$ingress_status_ip"
            echo "resolve_live_url_state_ingress_status_ip_matches_static_ip=$ingress_status_ip_matches_static_ip"
            echo "resolve_live_url_state_static_ip_bound_to_expected_forwarding_rule=$static_ip_bound_to_expected_forwarding_rule"
            echo "resolve_live_url_state_tls_certificate_status=$tls_certificate_status"
            echo "resolve_live_url_state_tls_domain_status=$tls_domain_status"
            echo "resolve_live_url_state_observed_managed_certificate_domains=$observed_managed_certificate_domains"
            echo "resolve_live_url_state_observed_managed_certificate_status=$observed_managed_certificate_status"
            echo "resolve_live_url_state_observed_managed_certificate_domain_status=$observed_managed_certificate_domain_status"
            echo "resolve_live_url_state_https_probe_error_summary=$https_probe_error_summary"
            echo "resolve_live_url_state_cert_identity_valid=$cert_identity_valid"
            echo "resolve_live_url_state_deploy_https_ready=$deploy_https_ready"
            echo "resolve_live_url_state_preview_https_status=$preview_https_status"
            echo "resolve_live_url_state_preview_http_status=$preview_http_status"
            echo "resolve_live_url_state_preview_probe_attempt=$preview_probe_attempt"
            echo "resolve_live_url_state_preview_probe_elapsed_seconds=$preview_probe_elapsed_seconds"
            echo "resolve_live_url_state_gce_backend_health_status=$gce_backend_health_status"
            echo "resolve_live_url_state_k8s_endpoint_ready=$k8s_endpoint_ready"
            echo "resolve_live_url_state_service_probe_status=$service_probe_status"
            echo "resolve_live_url_state_in_cluster_service_status_code=$in_cluster_service_status_code"
            echo "resolve_live_url_state_endpoint_probe_status=$endpoint_probe_status"
            echo "resolve_live_url_state_endpoint_probe_status_code=$endpoint_probe_status_code"
            echo "resolve_live_url_state_runtime_probe_status=$runtime_probe_status"
            echo "resolve_live_url_state_pod_restart_detected=$pod_restart_detected"
          }
          collect_ingress_502_runtime_diagnostics() {
            preview_probe_elapsed_seconds=$(( $(date +%s) - resolve_started_at ))
            if [ "$preview_probe_elapsed_seconds" -lt 0 ]; then
              preview_probe_elapsed_seconds=0
            fi
            echo "Collecting ingress-502 runtime diagnostics for namespace $K8S_NAMESPACE (preview host: $preview_host)."
            kubectl -n "$K8S_NAMESPACE" get pods -l app.kubernetes.io/name=site-web -o wide || true
            pods_describe_output="$(mktemp)"
            kubectl -n "$K8S_NAMESPACE" describe pods -l app.kubernetes.io/name=site-web > "$pods_describe_output" 2>&1 || true
            print_redacted_file "$pods_describe_output"
            if grep -qiE 'Restart Count:[[:space:]]*[1-9]|CrashLoopBackOff|Back-off restarting failed container|OOMKilled|Reason:[[:space:]]+Error' "$pods_describe_output"; then
              pod_restart_detected=true
            fi
            rm -f "$pods_describe_output"
            site_web_logs_output="$(mktemp)"
            kubectl -n "$K8S_NAMESPACE" logs -l app.kubernetes.io/name=site-web --tail=200 --all-containers=true > "$site_web_logs_output" 2>&1 || true
            print_redacted_file "$site_web_logs_output"
            rm -f "$site_web_logs_output"
            site_web_logs_previous_output="$(mktemp)"
            kubectl -n "$K8S_NAMESPACE" logs -l app.kubernetes.io/name=site-web --previous --tail=100 --all-containers=true > "$site_web_logs_previous_output" 2>&1 || true
            print_redacted_file "$site_web_logs_previous_output"
            rm -f "$site_web_logs_previous_output"
            deploy_yaml_output="$(mktemp)"
            kubectl -n "$K8S_NAMESPACE" get deploy site-web -o yaml > "$deploy_yaml_output" 2>&1 || true
            print_redacted_file "$deploy_yaml_output"
            rm -f "$deploy_yaml_output"
            kubectl -n "$K8S_NAMESPACE" get rs -l app.kubernetes.io/name=site-web -o wide || true
            kubectl -n "$K8S_NAMESPACE" get events --sort-by=.lastTimestamp || true
            ingress_describe_output_502="$(mktemp)"
            kubectl -n "$K8S_NAMESPACE" describe ingress site-web > "$ingress_describe_output_502" 2>&1 || true
            print_redacted_file "$ingress_describe_output_502"
            if grep -qiE 'HEALTHY' "$ingress_describe_output_502"; then
              gce_backend_health_status="HEALTHY"
            elif grep -qiE 'UNHEALTHY|DEGRADED' "$ingress_describe_output_502"; then
              gce_backend_health_status="UNHEALTHY"
            else
              gce_backend_health_status="UNKNOWN"
            fi
            rm -f "$ingress_describe_output_502"
            endpoint_ip="$(kubectl -n "$K8S_NAMESPACE" get endpoints site-web -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null || true)"
            if [ -n "$endpoint_ip" ]; then
              k8s_endpoint_ready="true"
            else
              k8s_endpoint_ready="false"
            fi
            if [ -n "$preview_host" ]; then
              preview_headers_output="$(mktemp)"
              preview_body_output="$(mktemp)"
              preview_https_status="$(curl --silent --show-error --connect-timeout 5 --max-time 15 -D "$preview_headers_output" -o "$preview_body_output" --write-out '%{http_code}' "https://$preview_host" 2>/dev/null || true)"
              echo "Preview HTTPS diagnostics status: ${preview_https_status:-unknown}"
              echo "--- preview HTTPS response headers (redacted) ---"
              head -n 40 "$preview_headers_output" | redact_sensitive_stream || true
              echo "--- preview HTTPS response snippet (redacted) ---"
              head -c 300 "$preview_body_output" | tr -d '\r' | redact_sensitive_stream || true
              echo
              rm -f "$preview_headers_output" "$preview_body_output"
            fi
            probe_pod="site-web-runtime-probe-${GITHUB_RUN_ID:-run}-${GITHUB_RUN_ATTEMPT:-1}"
            probe_pod="$(echo "$probe_pod" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-' | cut -c1-63)"
            kubectl -n "$K8S_NAMESPACE" delete pod "$probe_pod" --ignore-not-found >/dev/null 2>&1 || true
            service_probe_output="$(mktemp)"
            if kubectl -n "$K8S_NAMESPACE" run "$probe_pod" --image=curlimages/curl:8.10.1 --restart=Never --attach --command -- sh -c "curl -sS --connect-timeout 5 --max-time 15 --output /tmp/body --write-out '%{http_code}' http://site-web.${K8S_NAMESPACE}.svc.cluster.local:80/" >"$service_probe_output" 2>&1; then
              in_cluster_service_status_code="$(tr -cd '0-9' < "$service_probe_output" | tail -c 4)"
              if [ "$in_cluster_service_status_code" = "502" ]; then
                service_probe_status="http_502"
              elif echo "$in_cluster_service_status_code" | grep -Eq '^[1-5][0-9][0-9]$'; then
                service_probe_status="ok"
              else
                service_probe_status="unknown_status"
              fi
            else
              service_probe_status="failed"
              print_redacted_file "$service_probe_output"
            fi
            rm -f "$service_probe_output"
            kubectl -n "$K8S_NAMESPACE" delete pod "$probe_pod" --ignore-not-found >/dev/null 2>&1 || true
            if [ -n "$endpoint_ip" ]; then
              endpoint_probe_output="$(mktemp)"
              if kubectl -n "$K8S_NAMESPACE" run "$probe_pod" --image=curlimages/curl:8.10.1 --restart=Never --attach --command -- sh -c "curl -sS --connect-timeout 5 --max-time 15 --output /tmp/body --write-out '%{http_code}' http://${endpoint_ip}:8080/" >"$endpoint_probe_output" 2>&1; then
                endpoint_probe_status_code="$(tr -cd '0-9' < "$endpoint_probe_output" | tail -c 4)"
                if [ "$endpoint_probe_status_code" = "502" ]; then
                  endpoint_probe_status="http_502"
                elif echo "$endpoint_probe_status_code" | grep -Eq '^[1-5][0-9][0-9]$'; then
                  endpoint_probe_status="ok"
                else
                  endpoint_probe_status="unknown_status"
                fi
              else
                endpoint_probe_status="failed"
                print_redacted_file "$endpoint_probe_output"
              fi
              rm -f "$endpoint_probe_output"
            else
              endpoint_probe_status="endpoint_missing"
            fi
            kubectl -n "$K8S_NAMESPACE" delete pod "$probe_pod" --ignore-not-found >/dev/null 2>&1 || true
            runtime_probe_status="unknown"
            if [ "$pod_restart_detected" = true ]; then
              runtime_probe_status="pod_runtime_failure"
            elif [ "$service_probe_status" = "http_502" ] || [ "$endpoint_probe_status" = "http_502" ]; then
              runtime_probe_status="app_runtime_response_502"
            elif [ "$service_probe_status" = "ok" ] && [ "$endpoint_probe_status" = "ok" ] \
              && [ "$preview_https_status" = "502" ] && [ "$gce_backend_health_status" = "HEALTHY" ]; then
              runtime_probe_status="ingress_or_edge_convergence"
            elif [ "$service_probe_status" = "failed" ] || [ "$endpoint_probe_status" = "failed" ]; then
              runtime_probe_status="service_probe_failed"
            fi
            echo "deploy_runtime_reason_context=gce_backend_health=${gce_backend_health_status:-UNKNOWN};k8s_endpoint_ready=${k8s_endpoint_ready:-unknown};preview_https_status=${preview_https_status:-unknown};service_probe_status=${service_probe_status:-unknown};endpoint_probe_status=${endpoint_probe_status:-unknown};runtime_probe_status=${runtime_probe_status:-unknown}"
          }
          trap 'resolve_live_url_exit_code=$?; if [ "$resolve_live_url_exit_code" -ne 0 ]; then emit_resolve_live_url_state; fi' EXIT
          collect_resolve_live_url_evidence() {
            ingress_host="$(kubectl get ingress site-web --namespace "$K8S_NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
            ingress_ip="$(kubectl get ingress site-web --namespace "$K8S_NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)"
            ingress_spec_host="$(kubectl get ingress site-web --namespace "$K8S_NAMESPACE" -o jsonpath='{.spec.rules[0].host}' 2>/dev/null || true)"
            if [ -z "$preview_host" ] && [ -n "$ingress_spec_host" ]; then
              preview_host="$ingress_spec_host"
            fi
            ingress_status_ip="$ingress_ip"
            expected_static_ip_name="$(echo "$MBSRN_PREVIEW_STATIC_IP_NAME" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
            ingress_static_ip_annotation="$(kubectl get ingress site-web --namespace "$K8S_NAMESPACE" -o jsonpath='{.metadata.annotations.kubernetes\.io/ingress\.global-static-ip-name}' 2>/dev/null || true)"
            normalized_ingress_static_ip_annotation="$(echo "$ingress_static_ip_annotation" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
            static_ip_metadata_json="$(gcloud compute addresses describe "$MBSRN_PREVIEW_STATIC_IP_NAME" --global --project "$GKE_PROJECT_ID" --format='json(name,address,status,users)' 2>/dev/null || true)"
            if [ -n "$static_ip_metadata_json" ]; then
              static_ip_metadata_eval="$(STATIC_IP_METADATA_JSON="$static_ip_metadata_json" python - <<'PY'
          import json
          import os

          raw = str(os.environ.get('STATIC_IP_METADATA_JSON') or '').strip()
          payload = {}
          if raw:
              try:
                  payload = json.loads(raw)
              except Exception:
                  payload = {}
          address = str(payload.get('address') or '').strip()
          status = str(payload.get('status') or '').strip().upper()
          users = payload.get('users')
          normalized_users = []
          if isinstance(users, list):
              for item in users:
                  candidate = str(item or '').strip()
                  if candidate:
                      normalized_users.append(candidate)
          print(f'address={address}')
          print(f'status={status}')
          print('users=' + ','.join(normalized_users))
          PY
              )"
              while IFS='=' read -r key value; do
                case "$key" in
                  address)
                    expected_static_ip_address="$value"
                    ;;
                  status)
                    static_ip_status="$value"
                    ;;
                  users)
                    static_ip_users="$value"
                    ;;
