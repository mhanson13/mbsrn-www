              static_ip_users_lower="$(echo "$static_ip_users" | tr '[:upper:]' '[:lower:]')"
              namespace_token="$(echo "$K8S_NAMESPACE" | tr '[:upper:]' '[:lower:]')"
              if echo "$static_ip_users_lower" | grep -q '/forwardingrules/' \
