          ingress_host=""
          ingress_ip=""
          ingress_spec_host=""
          preview_host="$MBSRN_PREVIEW_HOSTNAME"
          host_reachable=false
          host_reachability_scheme=""
          tls_mismatch_detected=false
          backend_502_detected=false
          dns_record_matches_ingress=false
          dns_expected_ip=""
          dns_observed_ip=""
          expected_static_ip_address=""
          static_ip_status=""
          static_ip_users=""
          tls_certificate_status=""
          tls_domain_status=""
          ingress_status_ip=""
          ingress_status_ip_matches_static_ip=false
          static_ip_bound_to_expected_forwarding_rule=false
          ingress_conflict_detected=false
          cert_identity_valid=false
          deploy_https_ready=false
          observed_managed_certificate_domains=""
          observed_managed_certificate_status=""
          observed_managed_certificate_domain_status=""
          https_probe_error_summary=""
          https_probe_attempted=false
          http_fallback_attempted=false
          control_plane_ready=false
          live_url=""
          preview_https_status=""
          preview_http_status=""
          preview_probe_attempt=0
          preview_probe_elapsed_seconds=0
          gce_backend_health_status=""
          k8s_endpoint_ready=""
          service_probe_status=""
          in_cluster_service_status_code=""
          endpoint_probe_status=""
          endpoint_probe_status_code=""
          runtime_probe_status=""
          pod_restart_detected=false
          redact_sensitive_stream() {
            sed -E \
              -e 's/(Authorization:).*/\1 [REDACTED]/Ig' \
              -e 's/(Proxy-Authorization:).*/\1 [REDACTED]/Ig' \
              -e 's/(Cookie:).*/\1 [REDACTED]/Ig' \
              -e 's/(Set-Cookie:).*/\1 [REDACTED]/Ig' \
              -e 's/(Bearer )[A-Za-z0-9._~+\/=:-]+/\1[REDACTED]/g' \
              -e 's/(Basic )[A-Za-z0-9._~+\/=:-]+/\1[REDACTED]/g' \
              -e 's/([A-Za-z0-9_]*(token|secret|password|api[_-]?key)[A-Za-z0-9_]*[=:][[:space:]]*)[^[:space:]]+/\1[REDACTED]/Ig'
          }
          print_redacted_file() {
            local file_path="$1"
            if [ -f "$file_path" ]; then
              cat "$file_path" | redact_sensitive_stream
            fi
          }
          set_https_probe_error_summary() {
            local probe_reason="$1"
            local probe_exit_code="${2:-}"
            local probe_status_code="${3:-}"
            local probe_output_path="${4:-}"
            local probe_detail=""
            if [ -n "$probe_output_path" ] && [ -f "$probe_output_path" ]; then
              probe_detail="$(head -n 1 "$probe_output_path" | tr -d '\r' | tr '\t' ' ' | sed 's/[[:space:]]\+/ /g' | cut -c1-160)"
            fi
            if [ -z "$probe_detail" ]; then
              probe_detail="$probe_reason"
            fi
            https_probe_error_summary="reason=$probe_reason"
            if [ -n "$probe_exit_code" ]; then
              https_probe_error_summary="$https_probe_error_summary;exit_code=$probe_exit_code"
            fi
            if [ -n "$probe_status_code" ]; then
              https_probe_error_summary="$https_probe_error_summary;status=$probe_status_code"
            fi
            if [ -n "${http_fallback_attempted:-}" ]; then
              https_probe_error_summary="$https_probe_error_summary;http_fallback_attempted=$http_fallback_attempted"
            fi
            https_probe_error_summary="$https_probe_error_summary;detail=$probe_detail"
            https_probe_error_summary="$(echo "$https_probe_error_summary" | tr -d '\r' | cut -c1-240)"
          }
          ensure_https_probe_error_summary() {
            if [ "$deploy_https_ready" = "true" ]; then
              return
            fi
            if [ -n "$https_probe_error_summary" ]; then
              return
            fi
            fallback_reason=""
            fallback_detail=""
            normalized_cert_status_local="$(echo "${tls_certificate_status:-}" | tr '[:lower:]' '[:upper:]' | tr -d '[:space:]')"
            normalized_domain_status_local="$(echo "${tls_domain_status:-}" | tr '[:lower:]' '[:upper:]' | tr -d '[:space:]')"
            if [ "$normalized_domain_status_local" = "PROVISIONING" ] || [ "$normalized_cert_status_local" = "PROVISIONING" ]; then
              fallback_reason="managed_certificate_provisioning"
              fallback_detail="managed certificate/domain status still PROVISIONING"
            elif [ "${https_probe_attempted:-false}" = "true" ]; then
              if [ "${control_plane_ready:-false}" = "true" ]; then
                fallback_reason="https_probe_failed_after_control_plane_ready"
                fallback_detail="probe_attempted_without_error_summary"
              else
                fallback_reason="https_probe_failed"
                fallback_detail="probe_attempted_without_error_summary"
              fi
            elif [ "${dns_record_matches_ingress:-false}" != "true" ]; then
              fallback_reason="dns_not_ready"
              fallback_detail="dns_record_not_aligned_with_expected_ingress_target"
            elif [ -z "${preview_host:-}" ] || { [ -z "${ingress_ip:-}" ] && [ "${host_reachable:-false}" != "true" ]; }; then
              fallback_reason="host_resolution_pending"
              fallback_detail="preview_host_or_ingress_not_ready"
            elif [ "${cert_identity_valid:-false}" != "true" ] \
              || [ "$normalized_cert_status_local" != "ACTIVE" ] \
              || [ "$normalized_domain_status_local" != "ACTIVE" ]; then
